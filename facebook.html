<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>facebook sign up page</title>
    <link rel="stylesheet" href="facebook.css" />
  </head>
  <body>
    <div class="signup">
      <h1>facebook</h1>
      <input
        type="text"
        placeholder="Mobile number or email address"
        class="email"
      />
      <input type="text" placeholder="Enter your password" class="password" />
      <button class="logs">Login</button>
      <p class="bottom">Forgotten your password?</p>
      <hr class="rule" />
      <button class="create">Create new account</button>
    </div>
  </body>
</html>
